apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: recluster4-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: recluster-serving-cert
  namespace: recluster4-system
spec:
  dnsNames:
    - recluster4-webhook-service.recluster4-system.svc
    - recluster4-webhook-service.recluster4-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: webhook-server-cert
